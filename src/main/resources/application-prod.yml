spring:
  jpa:
    show-sql: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.lionsclub: WARN
    org.springframework.security: WARN

app:
  jwt:
    secret: ${JWT_SECRET}
    secure: true
