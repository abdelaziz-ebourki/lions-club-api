server:
  port: 8080

spring:
  application:
    name: lions-club-api
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/lions_club
    username: lions_club
    password: lions_club_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always


