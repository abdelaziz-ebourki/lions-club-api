name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: lions_club
          POSTGRES_PASSWORD: lions_club_dev
          POSTGRES_DB: lions_club
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lions_club -d lions_club"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build and test
        run: ./mvnw verify -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/lions_club
          SPRING_DATASOURCE_USERNAME: lions_club
          SPRING_DATASOURCE_PASSWORD: lions_club_dev
          SPRING_JPA_HIBERNATE_DDL_AUTO: validate
          APP_JWT_SECRET: ci-test-secret-that-is-at-least-256-bits-long-for-hs256